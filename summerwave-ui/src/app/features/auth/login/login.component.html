<div class="min-h-[calc(100vh-64px)] bg-slate-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/50 p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h2>
            <p class="mt-2 text-sm text-slate-500">
                Don't have an account?
                <a routerLink="/register" class="font-medium text-sky-600 hover:text-sky-500 transition-colors">Sign up
                    for free</a>
            </p>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <!-- Email Address -->
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700">Email address</label>
                <div class="mt-1">
                    <input id="email" type="email" formControlName="email"
                        class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-sky-500 focus:border-sky-500 sm:text-sm transition-colors"
                        placeholder="you@example.com"
                        [ngClass]="{'border-red-300 focus:border-red-500 focus:ring-red-500': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}">
                </div>
                <p *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                    class="mt-2 text-sm text-red-600">
                    Please enter a valid email address.
                </p>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                <div class="mt-1">
                    <input id="password" type="password" formControlName="password"
                        class="appearance-none block w-full px-4 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-sky-500 focus:border-sky-500 sm:text-sm transition-colors"
                        placeholder="••••••••"
                        [ngClass]="{'border-red-300 focus:border-red-500 focus:ring-red-500': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}">
                </div>
                <p *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                    class="mt-2 text-sm text-red-600">
                    Password must be at least 6 characters.
                </p>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 text-sky-600 focus:ring-sky-500 border-slate-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-900">Remember me</label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-sky-600 hover:text-sky-500 transition-colors">Forgot your
                        password?</a>
                </div>
            </div>

            <!-- Action Area -->
            <div>
                <button type="submit" [disabled]="loginForm.invalid || isSubmitting"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md shadow-sky-500/30 text-sm font-bold text-white bg-sky-500 hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 transition-all disabled:bg-slate-300 disabled:shadow-none disabled:cursor-not-allowed">

                    <span *ngIf="!isSubmitting">Sign in</span>

                    <svg *ngIf="isSubmitting" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                </button>
            </div>

            <!-- Test Info Banner -->
            <div class="mt-6 p-4 rounded-xl bg-blue-50 border border-blue-100">
                <h4 class="text-xs font-bold text-blue-800 uppercase tracking-wide mb-2">Test Credentials</h4>
                <div class="text-xs text-blue-700 space-y-1">
                    <p><strong>Customer:</strong> customer&#64;example.com</p>
                    <p><strong>Admin:</strong> admin&#64;example.com</p>
                    <p><em>Password works for both.</em></p>
                </div>
            </div>

        </form>
    </div>
</div>
