<!-- ═══════════════════════════════════════════════════════════
     SUMMERWAVE — Bright Colorful Waterpark Header
     ═══════════════════════════════════════════════════════════ -->
<header class="sw-header sticky top-0 z-50" style="height: var(--header-h, 72px);">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full">
        <div class="flex justify-between items-center h-full">

            <!-- ── Logo + Brand ─────────────────────────────────── -->
            <div class="flex-shrink-0">
                <a routerLink="/" class="flex items-center gap-3 group" aria-label="SummerWave Home">
                    <!-- Logo: sits perfectly on white bg with drop-shadow for pop -->
                    <div class="relative">
                        <img src="assets/images/summerwave_logo.png" alt="SummerWave Water Park Logo"
                            class="h-12 w-auto object-contain transition-transform duration-300 group-hover:scale-105"
                            style="filter: drop-shadow(0 2px 8px rgba(14,165,233,0.3)) drop-shadow(0 1px 3px rgba(249,115,22,0.2));">
                    </div>
                    <span class="sw-brand hidden sm:block">SummerWave<span>.</span></span>
                </a>
            </div>

            <!-- ── Desktop Nav ──────────────────────────────────── -->
            <nav class="hidden md:flex items-center gap-7" aria-label="Main navigation">
                <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                    class="sw-nav-link">Home</a>

                <a routerLink="/booking" routerLinkActive="active" class="sw-nav-link">Book Tickets</a>

                <!-- Guest -->
                <ng-container *ngIf="!authService.isAuthenticated()">
                    <a routerLink="/login" routerLinkActive="active" class="sw-nav-link">Log In</a>

                    <a routerLink="/register" class="sw-btn-primary">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        Sign Up Free
                    </a>
                </ng-container>

                <!-- Customer -->
                <ng-container *ngIf="authService.isAuthenticated() && authService.userRole() === 'CUSTOMER'">
                    <a routerLink="/dashboard" routerLinkActive="active" class="sw-nav-link">My Bookings</a>
                    <button (click)="logout()" class="sw-btn-ghost-danger">Log Out</button>
                </ng-container>

                <!-- Admin -->
                <ng-container *ngIf="authService.isAuthenticated() && authService.userRole() === 'ADMIN'">
                    <a routerLink="/admin" routerLinkActive="active" class="sw-nav-link">Admin Panel</a>
                    <button (click)="logout()" class="sw-btn-ghost-danger">Log Out</button>
                </ng-container>
            </nav>

            <!-- ── Mobile Hamburger ─────────────────────────────── -->
            <div class="flex md:hidden">
                <button (click)="toggleMenu()" class="p-2 rounded-xl transition-colors" style="color:#0EA5E9;"
                    [attr.aria-expanded]="isMenuOpen" aria-label="Toggle navigation">
                    <svg class="h-6 w-6" *ngIf="!isMenuOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    <svg class="h-6 w-6" *ngIf="isMenuOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- ── Mobile Menu ──────────────────────────────────────── -->
    <div class="sw-mobile-menu md:hidden" *ngIf="isMenuOpen">
        <div class="px-4 pt-3 pb-5 space-y-1">
            <a routerLink="/" (click)="toggleMenu()"
                class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-700 hover:bg-sky-50 hover:text-sky-600 transition-all">
                <span class="text-lg">🏠</span> Home
            </a>
            <a routerLink="/booking" (click)="toggleMenu()"
                class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-700 hover:bg-orange-50 hover:text-orange-500 transition-all">
                <span class="text-lg">🎫</span> Book Tickets
            </a>

            <ng-container *ngIf="!authService.isAuthenticated()">
                <a routerLink="/login" (click)="toggleMenu()"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-700 hover:bg-sky-50 hover:text-sky-600 transition-all">
                    <span class="text-lg">🔐</span> Log In
                </a>
                <div class="pt-2">
                    <a routerLink="/register" (click)="toggleMenu()"
                        class="sw-btn-primary w-full justify-center py-3 text-sm">
                        🎉 Sign Up Free
                    </a>
                </div>
            </ng-container>

            <ng-container *ngIf="authService.isAuthenticated() && authService.userRole() === 'CUSTOMER'">
                <a routerLink="/dashboard" (click)="toggleMenu()"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-700 hover:bg-cyan-50 hover:text-cyan-600 transition-all">
                    <span class="text-lg">📋</span> My Bookings
                </a>
                <button (click)="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-red-500 hover:bg-red-50 transition-all">
                    <span class="text-lg">🚪</span> Log Out
                </button>
            </ng-container>

            <ng-container *ngIf="authService.isAuthenticated() && authService.userRole() === 'ADMIN'">
                <a routerLink="/admin" (click)="toggleMenu()"
                    class="flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-slate-700 hover:bg-purple-50 hover:text-purple-600 transition-all">
                    <span class="text-lg">⚙️</span> Admin Panel
                </a>
                <button (click)="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-semibold text-sm text-red-500 hover:bg-red-50 transition-all">
                    <span class="text-lg">🚪</span> Log Out
                </button>
            </ng-container>
        </div>
    </div>
</header>
